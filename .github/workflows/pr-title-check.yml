name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed commit types
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Allowed scopes (optional — remove if you don't want to enforce scopes)
          scopes: |
            frontend
            backend
            docker
            config
            deps
            release
          # Allow scope to be optional
          requireScope: false
          # Minimum length for the subject (description after type)
          subjectPattern: ^.{3,}$
          subjectPatternError: |
            The PR title description is too short. Please use a meaningful description.
            Example: "feat(frontend): add dark mode toggle"
          # Show examples on failure
          validateSingleCommit: false
